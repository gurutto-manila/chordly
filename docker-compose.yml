version: "3.9"

services:
  web:
    build: .
    container_name: chordly_web
    restart: always
    ports:
      - "3000:3000"
  environment:
    RAILS_ENV: production
    RACK_ENV: production
    RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}

    DATABASE_URL: postgres://chordly:chordly@db:5432/chordly_production
    REDIS_URL: redis://redis:6379/0

    RECAPTCHA_SITE_KEY: ${RECAPTCHA_SITE_KEY}
    RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY}

    SECRET_KEY_BASE: ${SECRET_KEY_BASE}

    # 🔥 APP HOST (needed for Devise links)
    APP_HOST: ${APP_HOST}

    # 📧 SMTP CONFIG (FIXED)
    SMTP_ADDRESS: ${SMTP_ADDRESS}
    SMTP_PORT: 587 &{SMTP_PORT}
    SMTP_DOMAIN: ${SMTP_DOMAIN}
    SMTP_USERNAME: ${SMTP_USERNAME}
    SMTP_PASSWORD: ${SMTP_PASSWORD}
    SMTP_AUTHENTICATION: login
    SMTP_ENABLE_STARTTLS_AUTO: "true"

    RAILS_SERVE_STATIC_FILES: "true"
    RAILS_LOG_TO_STDOUT: "true"

    depends_on:
      - db
      - redis

    volumes:
      - .:/app

  db:
    image: postgres:15
    container_name: chordly_db
    restart: always
    environment:
      POSTGRES_USER: chordly
      POSTGRES_PASSWORD: chordly
      POSTGRES_DB: chordly_production
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: chordly_redis
    restart: always

volumes:
  postgres_data:
